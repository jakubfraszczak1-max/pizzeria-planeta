<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - Pizzeria Planeta</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { padding: 2rem; background: var(--color-bg); color: var(--color-text); font-family: inherit; }
    .card { background: var(--color-bg-card); padding: 1rem; border-radius: 12px; box-shadow: var(--shadow-md); max-width: 1200px; margin: 0 auto; }
    textarea { width: 100%; height: 320px; background: var(--color-bg-elevated); color: var(--color-text); border: 1px solid var(--color-border); padding: 0.75rem; border-radius: 8px; font-family: monospace; }
    .row { display:flex; gap:1rem; }
    .col { flex:1; }
    .controls { display:flex; gap:0.5rem; margin-top:0.5rem; }
    .notice { margin-top:0.5rem; color: var(--color-text-muted); }
    .admin-menu-editor__toolbar { margin-bottom: 1rem; }
    .admin-menu-category { margin-bottom: 1rem; padding: 1rem; border: 1px solid var(--color-border); border-radius: 10px; background: var(--color-bg-elevated); }
    .admin-menu-category__header { display:flex; justify-content:space-between; align-items:flex-start; gap: 1rem; margin-bottom: 0.75rem; }
    .admin-menu-category__title-group { display:flex; flex-wrap:wrap; gap:0.75rem; }
    .admin-menu-category__field { display:flex; flex-direction:column; gap:0.3rem; font-weight:500; min-width: 200px; }
    .admin-menu-category__field input { min-width: 180px; }
    .admin-menu-category__actions { display:flex; flex-wrap:wrap; gap:0.5rem; }
    .admin-menu-category__items { display:grid; gap:0.75rem; }
    .admin-menu-item-card { display:flex; align-items:center; gap:0.75rem; padding:0.75rem; background: var(--color-bg); border-radius: 8px; border: 1px solid var(--color-border); }
    .admin-menu-item-card img { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; }
    .admin-menu-item-card__title { font-weight: 600; }
    .admin-menu-item-card__price { color: var(--color-text-muted); font-size: 0.9rem; }
    .admin-menu-item-card__actions { margin-left:auto; display:flex; gap:0.5rem; }
    .admin-item-editor__grid { display:grid; gap:0.75rem; }
    .admin-item-editor__grid label { display:flex; flex-direction:column; gap:0.3rem; font-weight:500; }
    .admin-item-editor__grid input, .admin-item-editor__grid textarea, .admin-item-editor__grid select { background: var(--color-bg-elevated); color: var(--color-text); border: 1px solid var(--color-border); border-radius: 8px; padding:0.65rem; }
    .admin-item-editor__grid textarea { min-height: 90px; }
    .admin-item-editor__actions { display:flex; gap:0.75rem; margin-top:0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Panel administracyjny</h1>

    <div id="login">
      <label>Hasło:</label>
      <input id="admin-pass" type="password" placeholder="Wprowadź hasło">
      <button id="login-btn" class="btn btn-primary">Zaloguj</button>
    </div>

    <div id="panel" style="display:none;margin-top:1rem;">
      <div style="display:flex;gap:1rem;align-items:center;justify-content:space-between;">
        <h2>Edytuj ustawienia</h2>
        <div>
          <button id="save-repo-btn" class="btn btn-primary">Zapisz globalnie</button>
          <button id="download-btn" class="btn">Pobierz JSON</button>
          <button id="clear-btn" class="btn btn-secondary">Wyczyść override</button>
          <button id="logout-btn" class="btn">Wyloguj</button>
        </div>
      </div>

      <div style="margin-top:1rem;display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
        <input id="github-token" type="password" placeholder="Token GitHub" style="min-width:280px;">
        <button id="save-token-btn" class="btn">Zapamiętaj token</button>
      </div>

      <div class="row" style="margin-top:1rem;">
        <div class="col">
          <h3>config.json</h3>
          <textarea id="config-json"></textarea>
        </div>
        <div class="col">
          <h3>menu.json</h3>
          <textarea id="menu-json"></textarea>
        </div>
      </div>

      <div style="margin-top:1.5rem;">
        <h3>Graficzny edytor menu</h3>
        <div id="admin-menu-editor"></div>
        <div id="admin-item-editor" style="margin-top:1rem;"></div>
      </div>

      <p class="notice">Zmiany są od razu podglądane w panelu. Przyciskiem Zapisz globalnie zapisujesz je lokalnie i na GitHub, dzięki czemu działają także na GitHub Pages.</p>
    </div>
  </div>

  <script type="module" src="js/admin.js?v=2"></script>
</body>
</html>
